services:
  app:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-buds}
      POSTGRES_USER: ${POSTGRES_USER:-buds}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-buds}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-buds}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  grist:
    image: gristlabs/grist
    environment:
      APP_HOME_URL: http://82.22.3.55:8484
      GRIST_SESSION_SECRET: 50190045cb0973fb870e8a61bd06d4a23e8d11faf72d929f96f52cb61111370e
      GRIST_SINGLE_ORG: buds
    volumes:
      - gristdata:/persist
    ports:
      - "8484:8484"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  pgdata:
  gristdata:
  caddy_data:
  caddy_config:
